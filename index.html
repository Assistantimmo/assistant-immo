<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assistant Immo - Jade</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .active-tab { border-top: 4px solid #3b82f6; color: #3b82f6; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
    </style>
</head>
<body class="bg-gray-50 pb-20">

    <header class="bg-white shadow-sm p-4 sticky top-0 z-10 flex justify-between items-center">
        <h1 class="font-bold text-xl text-blue-600">Assistant Immo 🏠</h1>
        <div id="auth-container">
            <div id="g_id_onload"
                 data-client_id="196552745100-hpn388ci97s58rvhcel95ibbcum3c4rc.apps.googleusercontent.com"
                 data-callback="handleCredentialResponse"
                 data-auto_prompt="false">
            </div>
            <div class="g_id_signin" data-type="standard"></div>
        </div>
        <button id="logout-btn" onclick="logout()" class="hidden text-sm text-red-500">Déconnexion</button>
    </header>

    <main class="p-4">
        <div id="welcome-msg" class="text-center my-10">
            <p class="text-gray-500">Veuillez vous connecter pour accéder aux données.</p>
        </div>

        <div id="tab-ia" class="tab-content">
            <div class="bg-white rounded-xl shadow-md p-4 mb-4 h-96 flex flex-col">
                <div id="chat-box" class="flex-1 overflow-y-auto mb-4 space-y-3">
                    <p class="bg-blue-100 p-3 rounded-lg text-sm">Bonjour Jade ! Pose-moi une question sur tes clients ou tes biens.</p>
                </div>
                <div class="flex gap-2">
                    <input id="ia-input" type="text" placeholder="Qui relancer ?" class="flex-1 border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <button onclick="askGemini()" class="bg-blue-600 text-white px-4 py-2 rounded-lg"><i class="fas fa-paper-plane"></i></button>
                </div>
            </div>
        </div>

        <div id="tab-clients" class="tab-content">
            <h2 class="font-bold mb-4">Clients en cours</h2>
            <div id="clients-list" class="space-y-3 text-sm">
                </div>
        </div>

        <div id="tab-biens" class="tab-content">
            <h2 class="font-bold mb-4">Listing des Biens</h2>
            <div id="biens-list" class="grid grid-cols-1 gap-4">
                </div>
        </div>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t flex justify-around p-2 text-gray-500">
        <button onclick="showTab('clients')" class="flex flex-col items-center p-2 tab-btn" id="btn-clients">
            <i class="fas fa-users text-xl"></i><span class="text-xs">Suivi</span>
        </button>
        <button onclick="showTab('biens')" class="flex flex-col items-center p-2 tab-btn" id="btn-biens">
            <i class="fas fa-home text-xl"></i><span class="text-xs">Biens</span>
        </button>
        <button onclick="showTab('ia')" class="flex flex-col items-center p-2 tab-btn active-tab" id="btn-ia">
            <i class="fas fa-robot text-xl"></i><span class="text-xs">Assistant IA</span>
        </button>
    </nav>

    <script>
        const SPREADSHEET_ID = '1E8GasroeMO871PpvOC9XKBxjd0W-m97Xp0DoyWw16J4';
        const GEMINI_KEY = 'AIzaSyCIIpjACdkqS8qb7eBVC_mngYQsFWm2jp4';
        let accessToken = null;
        let userData = { clients: [], biens: [] };

        function handleCredentialResponse(response) {
            // Dans une vraie PWA, on demanderait le token d'accès ici
            // Pour simplifier l'accès au Sheets sans backend complexe :
            google.accounts.oauth2.initTokenClient({
                client_id: '196552745100-hpn388ci97s58rvhcel95ibbcum3c4rc.apps.googleusercontent.com',
                scope: 'https://www.googleapis.com/auth/spreadsheets.readonly',
                callback: (tokenResponse) => {
                    accessToken = tokenResponse.access_token;
                    document.getElementById('auth-container').classList.add('hidden');
                    document.getElementById('logout-btn').classList.remove('hidden');
                    document.getElementById('welcome-msg').classList.add('hidden');
                    loadData();
                },
            }).requestAccessToken();
        }

        async function loadData() {
            try {
                // Charger Clients (Onglet Suivi)
                const resClients = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}/values/Suivi!A:M`, {
                    headers: { Authorization: `Bearer ${accessToken}` }
                });
                const dataClients = await resClients.json();
                userData.clients = dataClients.values;
                renderClients();

                // Charger Biens
                const resBiens = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}/values/Biens!A:L`, {
                    headers: { Authorization: `Bearer ${accessToken}` }
                });
                const dataBiens = await resBiens.json();
                userData.biens = dataBiens.values;
                renderBiens();
            } catch (err) {
                console.error("Erreur chargement :", err);
            }
        }

        function renderClients() {
            const container = document.getElementById('clients-list');
            container.innerHTML = userData.clients.slice(1).map(row => `
                <div class="bg-white p-4 rounded-xl shadow-sm border-l-4 border-blue-500">
                    <div class="flex justify-between items-start">
                        <div>
                            <p class="font-bold">${row[0] || 'Nom inconnu'}</p>
                            <p class="text-gray-500 text-xs">${row[1] || ''} - ${row[3] || ''}k€</p>
                        </div>
                        <a href="tel:${row[6]}" class="text-green-500"><i class="fas fa-phone"></i></a>
                    </div>
                </div>
            `).join('');
        }

        function renderBiens() {
            const container = document.getElementById('biens-list');
            container.innerHTML = userData.biens.slice(1).map(row => `
                <div class="bg-white p-3 rounded-xl shadow-sm flex gap-3">
                    <div class="w-20 h-20 bg-gray-200 rounded-lg flex items-center justify-center text-gray-400">
                        <i class="fas fa-camera text-2xl"></i>
                    </div>
                    <div class="flex-1">
                        <p class="font-bold text-sm">${row[1] || 'Bien'}</p>
                        <p class="text-blue-600 font-bold">${row[3] || '0'} €</p>
                        <p class="text-gray-500 text-xs">${row[2] || ''}</p>
                    </div>
                </div>
            `).join('');
        }

        function showTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active-tab'));
            document.getElementById(`tab-${tabId}`).classList.add('active');
            document.getElementById(`btn-${tabId}`).classList.add('active-tab');
        }

        async function askGemini() {
            const input = document.getElementById('ia-input');
            const chatBox = document.getElementById('chat-box');
            if (!input.value) return;

            const userMsg = input.value;
            chatBox.innerHTML += `<p class="bg-gray-200 p-3 rounded-lg text-sm self-end text-right ml-10">${userMsg}</p>`;
            input.value = '';

            // Préparation du contexte pour l'IA
            const context = `Tu es l'assistant de Jade, agent immobilier. Voici ses données : 
            Clients : ${JSON.stringify(userData.clients.slice(0,10))}. 
            Biens : ${JSON.stringify(userData.biens.slice(0,10))}. 
            Réponds brièvement à la question : ${userMsg}`;

            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: context }] }] })
                });
                const data = await res.json();
                const aiResp = data.candidates[0].content.parts[0].text;
                chatBox.innerHTML += `<p class="bg-blue-100 p-3 rounded-lg text-sm mr-10">${aiResp}</p>`;
                chatBox.scrollTop = chatBox.scrollHeight;
            } catch (err) {
                chatBox.innerHTML += `<p class="text-red-500 text-xs">Erreur IA : ${err.message}</p>`;
            }
        }

        function logout() { location.reload(); }

        // Onglet par défaut
        showTab('ia');
    </script>
</body>
</html>
